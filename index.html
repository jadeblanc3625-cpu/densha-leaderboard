<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电车炫客 · 得分挑战赛排行榜</title>
<style>
  /* ===== 视觉主题变量：拿到品牌配色后改这几个就能整体换色 ===== */
  :root{
    --bg:        #0a0410;
    --bg2:       #140828;
    --neon-pink: #ff2e97;
    --neon-cyan: #00e5ff;
    --neon-yel:  #ffe600;
    --gold:      #ffd447;
    --silver:    #cfe3ff;
    --bronze:    #ff9a52;
    --text:      #f3eaff;
    --text-dim:  #9a8bb5;
    --card:      rgba(255,255,255,.04);
    --line:      rgba(255,46,151,.25);
    --font: "Segoe UI","PingFang SC","Microsoft YaHei",-apple-system,sans-serif;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased}

  /* 背景：斜向霓虹网格 + 光晕 */
  body{
    min-height:100vh;position:relative;overflow-x:hidden;
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(255,46,151,.18), transparent 60%),
      radial-gradient(1000px 500px at 90% 0%, rgba(0,229,255,.14), transparent 55%),
      linear-gradient(160deg,var(--bg) 0%,var(--bg2) 100%);
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.35;
    background-image:
      linear-gradient(transparent 95%, rgba(0,229,255,.25) 95%),
      linear-gradient(90deg,transparent 95%, rgba(255,46,151,.2) 95%);
    background-size:44px 44px;
    transform:perspective(400px) rotateX(58deg);
    transform-origin:top;
    mask-image:linear-gradient(to bottom, #000 0%, transparent 55%);
  }

  .wrap{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:32px 20px 80px}

  /* ===== 顶部 ===== */
  header{text-align:center;margin-bottom:8px}
  .kicker{
    display:inline-block;font-size:12px;letter-spacing:.35em;color:var(--neon-cyan);
    border:1px solid var(--neon-cyan);border-radius:999px;padding:5px 16px;margin-bottom:16px;
    text-shadow:0 0 8px var(--neon-cyan);box-shadow:0 0 18px rgba(0,229,255,.25) inset;
  }

  /* ===== 品牌 LOGO ===== */
  .logo-wrap{margin:6px auto 4px;display:flex;justify-content:center}
  .logo-link{display:block;line-height:0;width:min(78%,520px);transition:transform .18s ease}
  .logo-link:hover{transform:scale(1.04)}
  .logo-link:active{transform:scale(.99)}
  .logo{
    width:100%;height:auto;display:block;
    /* 霓虹辉光，让透明 logo 融入暗色主题 */
    filter:
      drop-shadow(0 0 22px rgba(255,46,151,.45))
      drop-shadow(0 0 42px rgba(0,229,255,.28));
    animation:logoGlow 3.6s ease-in-out infinite;
  }
  @keyframes logoGlow{
    0%,100%{filter:drop-shadow(0 0 20px rgba(255,46,151,.40)) drop-shadow(0 0 36px rgba(0,229,255,.22))}
    50%    {filter:drop-shadow(0 0 30px rgba(255,46,151,.60)) drop-shadow(0 0 54px rgba(0,229,255,.38))}
  }
  @media (prefers-reduced-motion:reduce){ .logo{animation:none} }

  /* 屏幕阅读器可见、视觉隐藏（保留 h1 语义） */
  .sr-only{
    position:absolute;width:1px;height:1px;padding:0;margin:-1px;
    overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
  }
  h1{
    font-size:clamp(28px,6vw,52px);line-height:1.05;font-weight:900;letter-spacing:.02em;
    background:linear-gradient(90deg,var(--neon-pink),var(--neon-yel),var(--neon-cyan));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 18px rgba(255,46,151,.35));
  }
  .stage{
    margin-top:14px;display:inline-flex;align-items:center;gap:8px;
    font-size:clamp(13px,2.6vw,16px);color:var(--text);
    background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 16px;
  }
  .stage b{color:var(--neon-yel)}

  /* ===== 倒计时 ===== */
  .countdown{margin:26px auto 8px;display:flex;justify-content:center;gap:10px}
  .cd-box{
    min-width:74px;background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:12px 8px;text-align:center;backdrop-filter:blur(4px);
  }
  .cd-num{font-size:clamp(24px,6vw,40px);font-weight:900;color:var(--neon-cyan);text-shadow:0 0 14px rgba(0,229,255,.6);line-height:1}
  .cd-label{font-size:11px;letter-spacing:.2em;color:var(--text-dim);margin-top:6px}
  .cd-note{text-align:center;color:var(--text-dim);font-size:13px;margin-top:10px}
  .cd-ended{color:var(--neon-pink);font-weight:700;text-shadow:0 0 10px rgba(255,46,151,.5)}

  /* ===== 提交按钮 ===== */
  .cta{text-align:center;margin:30px 0 6px}
  .submit-btn{
    display:inline-block;font-size:clamp(15px,3.2vw,19px);font-weight:900;letter-spacing:.05em;
    color:#0a0410;text-decoration:none;padding:15px 40px;border-radius:999px;
    background:linear-gradient(90deg,var(--neon-yel),var(--neon-pink));
    box-shadow:0 0 26px rgba(255,46,151,.5), 0 6px 20px rgba(0,0,0,.4);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .submit-btn:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 0 40px rgba(255,46,151,.7)}
  .submit-btn.disabled{background:rgba(255,255,255,.12);color:var(--text-dim);box-shadow:none;cursor:not-allowed;pointer-events:none}
  .cta-hint{color:var(--text-dim);font-size:12px;margin-top:12px;line-height:1.7;padding:0 10px}

  /* ===== 领奖台 ===== */
  .podium{
    display:grid;grid-template-columns:1fr 1.15fr 1fr;gap:12px;align-items:end;
    margin:40px 0 30px;
  }
  .pod{position:relative;border-radius:16px 16px 8px 8px;padding:18px 12px 20px;text-align:center;
    border:1px solid var(--line);background:var(--card);backdrop-filter:blur(6px);overflow:hidden}
  .pod::after{content:"";position:absolute;left:0;right:0;top:0;height:4px}
  .pod.g1{transform:translateY(-18px)}
  .pod.g1::after{background:var(--gold);box-shadow:0 0 20px var(--gold)}
  .pod.g2::after{background:var(--silver);box-shadow:0 0 20px var(--silver)}
  .pod.g3::after{background:var(--bronze);box-shadow:0 0 20px var(--bronze)}
  .pod.g1{box-shadow:0 0 40px rgba(255,212,71,.22)}
  .medal{font-size:34px;line-height:1;margin-bottom:8px}
  .pod .pname{font-weight:800;font-size:clamp(14px,3vw,18px);margin-bottom:4px;word-break:break-all}
  .pod .pscore{font-size:clamp(18px,4.5vw,28px);font-weight:900;color:var(--neon-yel);text-shadow:0 0 10px rgba(255,230,0,.4)}
  .pod .pmeta{font-size:12px;color:var(--text-dim);margin-top:6px;display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap}
  .pod .plat{padding:2px 8px;border-radius:6px;background:rgba(255,255,255,.06);border:1px solid var(--line)}
  .pod a.vid{color:var(--neon-cyan);text-decoration:none;font-size:12px;border-bottom:1px dashed var(--neon-cyan)}

  /* ===== 榜单表 ===== */
  .board{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;backdrop-filter:blur(6px)}
  .row{display:grid;grid-template-columns:64px 1fr 130px 90px 70px;align-items:center;
    padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.05);gap:8px}
  .row.head{color:var(--text-dim);font-size:12px;letter-spacing:.1em;text-transform:uppercase;background:rgba(0,0,0,.2)}
  .row:last-child{border-bottom:none}
  .row:not(.head):hover{background:rgba(255,46,151,.06)}
  .rk{font-weight:900;font-size:18px;color:var(--neon-pink);text-align:center}
  .nm{font-weight:700;word-break:break-all}
  .sc{font-weight:900;color:var(--neon-yel);font-size:17px;text-align:right}
  .pl{font-size:12px;color:var(--text-dim);text-align:center}
  .pl span{padding:2px 8px;border-radius:6px;background:rgba(255,255,255,.06);border:1px solid var(--line)}
  .vd{text-align:center}
  .vd a{color:var(--neon-cyan);text-decoration:none;font-size:13px}
  .vd a:hover{text-shadow:0 0 8px var(--neon-cyan)}
  .vd .novid{color:var(--text-dim);opacity:.5}

  footer{text-align:center;color:var(--text-dim);font-size:12px;margin-top:28px;line-height:1.9}

  /* ===== 空榜提示 ===== */
  .empty{
    text-align:center;padding:48px 20px;color:var(--text-dim);
  }
  .empty .big{
    font-size:clamp(18px,4vw,24px);font-weight:900;margin-bottom:10px;
    background:linear-gradient(90deg,var(--neon-pink),var(--neon-cyan));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .empty .sub{font-size:14px;line-height:1.8}

  @media (max-width:600px){
    .row{grid-template-columns:44px 1fr 62px 54px;font-size:13px;padding:12px 10px}
    .row .pl{display:none}          /* 手机上隐藏平台列，省空间 */
    .podium{gap:6px}
    .pod.g1{transform:translateY(-10px)}
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="kicker">SCORE CHALLENGE · 得分挑战赛</span>
      <div class="logo-wrap">
        <a class="logo-link" href="https://store.steampowered.com/app/2524850/_/" target="_blank" rel="noopener" title="前往 Steam 商店页">
          <img class="logo" src="logo.png" alt="电车炫客 · 点击前往 Steam 商店页" decoding="async">
        </a>
      </div>
      <h1 id="title" class="sr-only">《电车炫客》得分挑战赛</h1>
      <div class="stage">📍 挑战关卡 · <b id="stage">四国区域 3-2-2 「信的试炼场」</b></div>
    </header>

    <div class="countdown" id="countdown"></div>
    <div class="cd-note" id="cdnote"></div>

    <div class="cta">
      <a class="submit-btn" id="submitBtn" href="#" target="_blank" rel="noopener">🎬 提交我的炫技成绩</a>
      <div class="cta-hint">上传未剪辑通关视频（含最终得分画面）· 官方审核后计入排行榜</div>
    </div>

    <div class="podium" id="podium"></div>

    <div class="board" id="board"></div>

    <footer>
      榜单每日更新 · 数据以官方审核有效成绩为准<br>
      同分时以提交时间早者优先 · 最终解释权归主办方所有<br>
      <span id="updated"></span>
    </footer>
  </div>

  <script src="scores.js?v=10"></script>
  <script>
    // ---- 平台图标 ----
    const PLAT_ICON = { Steam:"🎮 Steam", PS:"🕹 PS", Xbox:"🎯 Xbox", Switch:"🔴 Switch" };
    function platLabel(p){ return PLAT_ICON[p] || p; }
    function fmt(n){ return n.toLocaleString("en-US"); }
    // 有真实链接才算有视频：空字符串、缺省、"#" 都视为无视频
    function hasVideo(v){ return typeof v === "string" && v.trim() !== "" && v.trim() !== "#"; }

    // ---- 排序：分数降序，同分则日期早者优先 ----
    const ranked = [...PLAYERS].sort((a,b)=>{
      if(b.score !== a.score) return b.score - a.score;
      return new Date(a.date) - new Date(b.date);
    });

    // ---- 填充标题/关卡 ----
    document.getElementById("title").textContent = EVENT.title;
    document.getElementById("stage").textContent = EVENT.stage;
    document.getElementById("updated").textContent = "最近更新：" + EVENT.updatedAt;

    // ---- 提交按钮 ----
    const submitBtn = document.getElementById("submitBtn");
    if(EVENT.formUrl){ submitBtn.href = EVENT.formUrl; }
    else { submitBtn.classList.add("disabled"); submitBtn.textContent = "提交入口暂未开放"; }

    // ---- 空榜：无成绩时显示占位提示，跳过领奖台和榜单 ----
    const podEl = document.getElementById("podium");
    const boardEl = document.getElementById("board");
    if(ranked.length === 0){
      podEl.remove();
      boardEl.innerHTML = `
        <div class="empty">
          <div class="big">🏁 榜单虚位以待</div>
          <div class="sub">还没有炫客登榜——通关 3-2-2「信的试炼场」，<br>录下你的成绩，抢占首个王座！</div>
        </div>`;
    } else {

    // ---- 领奖台（前三）----
    const podiumOrder = [1,0,2]; // 视觉顺序：银 金 铜
    const medals = ["🥇","🥈","🥉"];
    podiumOrder.forEach(i=>{
      const p = ranked[i];
      if(!p){ podEl.insertAdjacentHTML("beforeend", `<div></div>`); return; }
      podEl.insertAdjacentHTML("beforeend", `
        <div class="pod g${i+1}">
          <div class="medal">${medals[i]}</div>
          <div class="pname">${escapeHtml(p.name)}</div>
          <div class="pscore">${fmt(p.score)}</div>
          <div class="pmeta">
            <span class="plat">${platLabel(p.platform)}</span>
            ${hasVideo(p.video) ? `<a class="vid" href="${encodeURI(p.video)}" target="_blank" rel="noopener">▶ 视频</a>` : ``}
          </div>
        </div>`);
    });

    // ---- 完整榜单 ----
    boardEl.insertAdjacentHTML("beforeend", `
      <div class="row head">
        <div class="rk">#</div><div class="nm">炫客</div>
        <div class="sc">分数</div><div class="pl">平台</div><div class="vd">视频</div>
      </div>`);
    ranked.forEach((p,i)=>{
      boardEl.insertAdjacentHTML("beforeend", `
        <div class="row">
          <div class="rk">${i+1}</div>
          <div class="nm">${escapeHtml(p.name)}</div>
          <div class="sc">${fmt(p.score)}</div>
          <div class="pl"><span>${platLabel(p.platform)}</span></div>
          <div class="vd">${hasVideo(p.video) ? `<a href="${encodeURI(p.video)}" target="_blank" rel="noopener">▶ 观看</a>` : `<span class="novid">—</span>`}</div>
        </div>`);
    });
    } // end 非空榜单

    // ---- 倒计时 ----
    const cdEl = document.getElementById("countdown");
    const noteEl = document.getElementById("cdnote");
    const deadline = new Date(EVENT.deadline).getTime();
    function tick(){
      const now = Date.now();
      let diff = deadline - now;
      if(diff <= 0){
        cdEl.innerHTML = "";
        noteEl.innerHTML = '<span class="cd-ended">⛔ 挑战赛已截止，感谢各位炫客大人的参与！</span>';
        submitBtn.classList.add("disabled");
        submitBtn.textContent = "提交已截止";
        submitBtn.removeAttribute("href");
        clearInterval(timer);
        return;
      }
      const d = Math.floor(diff/86400000); diff-=d*86400000;
      const h = Math.floor(diff/3600000);  diff-=h*3600000;
      const m = Math.floor(diff/60000);     diff-=m*60000;
      const s = Math.floor(diff/1000);
      cdEl.innerHTML = [[d,"天"],[h,"时"],[m,"分"],[s,"秒"]].map(([v,l])=>`
        <div class="cd-box"><div class="cd-num">${String(v).padStart(2,"0")}</div><div class="cd-label">${l}</div></div>
      `).join("");
      noteEl.textContent = "距报名截止 · " + new Date(EVENT.deadline).toLocaleDateString("zh-CN");
    }
    function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
    tick();
    const timer = setInterval(tick,1000);
  </script>
</body>
</html>
